<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LyanRecoil</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: url('Imagen.png') no-repeat center center/cover;
    }

    .player {
      width: 320px;
      background: url('vomito.png') center/cover;
      position: relative;
      border-radius: 20px;
      padding: 20px;
      color: white;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      text-align: center;
      overflow: hidden;
    }

    .player::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: brightness(0.6);
      z-index: 0;
      border-radius: 20px;
    }

    .player * {
      position: relative;
      z-index: 1;
    }

    .cover {
      width: 100%;
      height: 200px;
      background: url('Imagen.png') center/cover;
      border-radius: 15px;
      margin-bottom: 15px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
    }

    .artist {
      font-size: 14px;
      color: #b3b3b3;
      margin-bottom: 15px;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 10px;
    }

    button {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }

    .play {
      background: #8A2BE2;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 22px;
      box-shadow: 0 0 15px rgba(29,185,84,0.6);
    }

    .progress {
      width: 100%;
      height: 5px;
      background: #333;
      border-radius: 5px;
      margin: 15px 0;
      cursor: pointer;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #8A2BE2;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <div class="player">
    <div class="cover"></div>
    <div class="title">NOVA'S PUKE TORTURE</div>
    <div class="artist">LyanRecoil</div>

    <div class="progress" id="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="controls">
      <button onclick="rewind()">⏮</button>
      <button class="play" onclick="togglePlay()" id="playBtn">▶</button>
      <button onclick="forward()">⏭</button>
    </div>

    <audio id="audio">
      <source src="NOVA'S PUKE TORTURE.wav" type="audio/mpeg">
    </audio>
  </div>

  <script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const progress = document.getElementById('progress');
    const progressBar = document.getElementById('progressBar');

    function togglePlay() {
      if (audio.paused) {
        audio.play();
        playBtn.textContent = '⏸';
      } else {
        audio.pause();
        playBtn.textContent = '▶';
      }
    }

    function rewind() {
      audio.currentTime -= 10;
    }

    function forward() {
      audio.currentTime += 10;
    }

    audio.addEventListener('timeupdate', () => {
      const percent = (audio.currentTime / audio.duration) * 100;
      progressBar.style.width = percent + '%';
    });

    progress.addEventListener('click', (e) => {
      const width = progress.clientWidth;
      const clickX = e.offsetX;
      const duration = audio.duration;
      audio.currentTime = (clickX / width) * duration;
    });
  </script>

</body>
</html>
